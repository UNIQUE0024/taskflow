<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>TaskFlow</h1>
      <p class="tagline">Plan it. Track it. Ship it.</p>
    </header>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="What needs doing?" required>
      <input type="number" id="task-cost" placeholder="Est. cost ($)" min="0" step="0.01">
      <button type="submit">Add Task</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="task-list"></ul>

    <footer>
      <span id="task-count">0 tasks</span>
      <span id="budget-total">Est. total: $0.00</span>
    </footer>
  </div>

  <script src="src/auth.js"></script>
  <script src="src/budget.js"></script>
  <script src="script.js"></script>
</body>
</html>
